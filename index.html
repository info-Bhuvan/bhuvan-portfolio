<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuvan Bommannavar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#f5f7fa;
--bg2:#e4ecf5;
--accent:#2563eb;
--text:#0f172a;
--muted:#64748b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
overflow-x:hidden;
scroll-behavior:smooth;
}

/* Animated layered background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(37,99,235,0.15), transparent),
radial-gradient(circle at 80% 70%, rgba(14,165,233,0.15), transparent);
animation:move 20s ease-in-out infinite alternate;
z-index:-2;
}
@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-8%, -8%);}
}

/* Header */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.6);
z-index:100;
}

.logo{
font-family:'Playfair Display',serif;
font-size:26px;
font-weight:700;
}

.header-buttons{
display:flex;
gap:15px;
}

.btn{
padding:10px 20px;
border-radius:30px;
text-decoration:none;
font-size:14px;
font-weight:500;
background:var(--accent);
color:white;
transition:0.3s ease;
}
.btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 25px rgba(37,99,235,0.25);
}

/* Sections */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:140px 10%;
opacity:0;
transform:translateY(40px);
transition:all 1s ease;
}
section.visible{
opacity:1;
transform:translateY(0);
}

/* Hero */
.hero{
text-align:center;
}
.hero h1{
font-family:'Playfair Display',serif;
font-size:52px;
margin-bottom:20px;
}
.hero p{
font-size:20px;
color:var(--muted);
max-width:750px;
margin:auto;
}

/* Pallets */
.pallet-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
margin-top:60px;
}

.pallet{
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(25px);
cursor:pointer;
transition:all .4s ease;
font-weight:500;
}
.pallet:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 25px 40px rgba(0,0,0,0.08);
}

/* Slide panel */
.detail-panel{
position:fixed;
top:0;
right:-100%;
width:50%;
height:100%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(40px);
padding:120px 60px;
overflow-y:auto;
transition:0.6s cubic-bezier(.77,0,.18,1);
z-index:200;
}
.detail-panel.active{
right:0;
}

.close{
position:absolute;
top:40px;
right:50px;
font-size:22px;
cursor:pointer;
}

.detail-panel h2{
font-family:'Playfair Display',serif;
font-size:36px;
margin-bottom:30px;
}
.detail-panel h3{
margin-top:25px;
font-size:18px;
font-weight:600;
}
.detail-panel p{
margin-top:8px;
color:var(--muted);
line-height:1.6;
}

/* Mobile */
@media(max-width:900px){
.detail-panel{width:100%;padding:100px 30px;}
.hero h1{font-size:34px;}
}
</style>
</head>
<body>

<header>
<div class="logo">Bhuvan Bommannavar</div>
<div class="header-buttons">
<a href="Bhuvan_CV_23-02-2026.pdf" download class="btn">Download Resume</a>
<a href="mailto:info.bhuvaneshwar.b@gmail.com" class="btn">Contact Me</a>
</div>
</header>

<section class="hero">
<h1>Hey 👋 Welcome to My Profile</h1>
<p>
Bhuvan here. You can know more about me here.  
If you find this interesting, feel free to connect with me.
</p>
</section>

<section>
<div class="pallet-grid">
<div class="pallet" onclick="openPanel('objective')">Objective</div>
<div class="pallet" onclick="openPanel('skills')">Skills</div>
<div class="pallet" onclick="openPanel('experience')">Experience</div>
<div class="pallet" onclick="openPanel('education')">Education</div>
<div class="pallet" onclick="openPanel('projects')">Projects</div>
<div class="pallet" onclick="openPanel('awards')">Awards & Achievements</div>
<div class="pallet" onclick="openPanel('certifications')">Certifications</div>
<div class="pallet" onclick="openPanel('internship')">Internship</div>

</section>

<div class="detail-panel" id="panel">

<script>

const data = {
objective: `

`,
experience: `
<h2>Experience</h2>

<p>01/05/2025 – Present</p>
<p>Sales Manager</p>
<h3>Sobha Ltd</h3>
<p>01/06/2024 – 28/02/2025</p>
<p>Assistant Sales Manager</p>
<h3>Fly Realty</h3>
<p>18/04/2023 – 08/05/2024</p>
<p>Senior Relationship Manager</p>
<h3>Brad Realty</h3>
<p>21/04/2022 – 17/04/2023</p>
<p>Relationship Manager</p>
`,
education: `
<h2>Education</h2>
<h3>MBA – Finance & Marketing</h3>
<p>REVA University | 8.26 CGPA | 2020–2022</p>

`,
projects: `

`,
awards: `

`,
certifications: `

`,

`
};

function openPanel(section){
document.getElementById("panel-content").innerHTML = data[section];
document.getElementById("panel").classList.add("active");
}
function closePanel(){
document.getElementById("panel").classList.remove("active");
}

const sections = document.querySelectorAll("section");
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("visible");
}
});
},{threshold:0.2});
sections.forEach(section=>observer.observe(section));

</script>

</body>
</html>
