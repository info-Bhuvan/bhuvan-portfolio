<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuvan Bommannavar | Spatial Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Inter',sans-serif;
background:#000;
color:white;
}

#overlayContent{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:900px;
background:rgba(15,23,42,0.95);
backdrop-filter:blur(25px);
padding:40px;
border-radius:20px;
display:none;
z-index:10;
}

#overlayContent h2{
margin-bottom:20px;
}

#closeBtn{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
font-size:20px;
color:#00f5d4;
}

#download{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
background:#00f5d4;
color:#000;
border-radius:30px;
text-decoration:none;
font-weight:600;
z-index:10;
}
</style>
</head>

<body>

<div id="overlayContent">
<span id="closeBtn">✖</span>
<h2 id="panelTitle"></h2>
<p id="panelText"></p>
</div>

<a id="download" href="Bhuvan_Bommannavar_Resume.pdf" download>Download Resume</a>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 15;

// Ambient Light
const light = new THREE.PointLight(0xffffff,1);
light.position.set(20,20,20);
scene.add(light);

// Floating Panels Data
const panelsData = [
{ title:"About", text:"MBA (Finance & Marketing), 8.26 CGPA. Skilled in Excel, SQL, Power BI, Tableau. 3+ years real estate leadership experience."},
{ title:"Experience", text:"Sales Manager – Premier Real Estate Services. Assistant Sales Manager – Sobha Ltd. Senior Relationship Manager – Fly Realty. Relationship Manager – Brad Realty."},
{ title:"Projects", text:"Risk Analysis in Capital Budgeting. Deloitte Data Simulation. Robotic Arm. Prosthetic Arm. Multi Maize Thresher."},
{ title:"Contact", text:"Email: info.bhuvaneshwar.b@gmail.com | Phone: 8867429944 | Bangalore, India."}
];

let panels = [];

const geometry = new THREE.BoxGeometry(5,3,0.3);
const material = new THREE.MeshStandardMaterial({color:0x00f5d4, metalness:0.6, roughness:0.2});

panelsData.forEach((data,i)=>{
let panel = new THREE.Mesh(geometry, material.clone());
panel.position.x = (i-1.5)*7;
panel.position.y = Math.sin(i)*2;
panel.userData = data;
scene.add(panel);
panels.push(panel);
});

// Raycaster for clicks
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", function(event){
mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

raycaster.setFromCamera(mouse, camera);
const intersects = raycaster.intersectObjects(panels);

if(intersects.length > 0){
openPanel(intersects[0].object.userData);
}
});

function openPanel(data){
document.getElementById("panelTitle").innerText = data.title;
document.getElementById("panelText").innerText = data.text;
document.getElementById("overlayContent").style.display="block";
}

document.getElementById("closeBtn").onclick = function(){
document.getElementById("overlayContent").style.display="none";
}

// Animate floating effect
function animate(){
requestAnimationFrame(animate);

panels.forEach((panel,i)=>{
panel.rotation.y += 0.005;
panel.position.y = Math.sin(Date.now()*0.001 + i)*1.5;
});

renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});

</script>

</body>
</html>
