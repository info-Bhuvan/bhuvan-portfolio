<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuvan Bommannavar</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
:root{
--bg:#04060c;
--glass:rgba(255,255,255,0.05);
--accent:#4f8cff;
--text:#f1f5f9;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* Header */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 8%;
z-index:100;
transition:opacity 0.6s ease;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:34px;
font-weight:700;
}

.header-buttons{
display:flex;
gap:20px;
}

.btn{
padding:10px 24px;
border-radius:40px;
background:var(--accent);
color:white;
text-decoration:none;
transition:0.4s cubic-bezier(.16,1,.3,1);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(79,140,255,0.4);
}

/* Sections */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:160px 10%;
}

.hero{
text-align:center;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:64px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:var(--muted);
}
</style>
</head>
<body>

<header id="header">
<div class="logo">Bhuvan Bommannavar</div>
<div class="header-buttons">
<a href="Bhuvan_CV_23-02-2026.pdf" download class="btn">Download Resume</a>
<a href="#contact" class="btn">Contact Me</a>
</div>
</header>

<section class="hero">
<h1 id="typing"></h1>
<p>Scroll to explore the journey.</p>
</section>

<section></section>
<section></section>
<section id="contact">
<p>Phone: +91 8867429944</p>
<p>Email: <a href="mailto:info.bhuvaneshwar.b@gmail.com" style="color:#4f8cff;">info.bhuvaneshwar.b@gmail.com</a></p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ===============================
   THREE JS DEPTH SYSTEM
================================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

camera.position.z = 8;

/* Particle Layers */
const particlesCount = 6000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particlesCount * 3);

for(let i=0;i<particlesCount;i++){
positions[i*3] = (Math.random()-0.5)*40;
positions[i*3+1] = (Math.random()-0.5)*40;
positions[i*3+2] = (Math.random()-0.5)*60; // Z depth distribution
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
size:0.02,
color:0x4f8cff,
transparent:true,
opacity:0.8
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

/* ===============================
   SCROLL-DRIVEN CAMERA DEPTH
================================= */

gsap.to(camera.position,{
z:2,
scrollTrigger:{
trigger:document.body,
start:"top top",
end:"bottom bottom",
scrub:true
}
});

/* ===============================
   MOUSE PARALLAX
================================= */

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove",(e)=>{
mouseX = (e.clientX/window.innerWidth - 0.5) * 2;
mouseY = (e.clientY/window.innerHeight - 0.5) * 2;
});

/* ===============================
   PARTICLE DEPTH RESPONSE
================================= */

let scrollVelocity = 0;

ScrollTrigger.create({
start:0,
end:"max",
onUpdate:(self)=>{
scrollVelocity = self.getVelocity() * 0.00005;
}
});

/* ===============================
   RENDER LOOP
================================= */

function animate(){
requestAnimationFrame(animate);

/* subtle rotation */
particles.rotation.y += 0.0004;
particles.rotation.x += 0.0002;

/* camera parallax */
camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
camera.position.y += (-mouseY * 2 - camera.position.y) * 0.02;

/* depth response */
particles.rotation.z += scrollVelocity;

/* smooth damping */
scrollVelocity *= 0.9;

renderer.render(scene,camera);
}
animate();

/* Resize */
window.addEventListener('resize',()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});

/* ===============================
   TYPING EFFECT
================================= */

const text="Hey 👋 Welcome to my profile. Bhuvan here.";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}
typing();

/* Header dissolve */
window.addEventListener("scroll",()=>{
let header=document.getElementById("header");
header.style.opacity=1-window.scrollY/300;
});
</script>

</body>
</html>
